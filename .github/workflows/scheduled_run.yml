name: Scheduled FMCG Newsletter Run

on:
  schedule:
    # Runs daily at 06:00 UTC (~11:30 AM IST). Adjust as needed.
    - cron: "0 6 * * *"
  workflow_dispatch: {}   # allow manual trigger from the Actions tab

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python run_pipeline.py

      - name: Commit fresh outputs
        run: |
          git config user.name "fmcg-newsletter-bot"
          git config user.email "actions@github.com"
          git add data/output/
          git diff --cached --quiet || git commit -m "chore: scheduled newsletter refresh [skip ci]"
          git push
